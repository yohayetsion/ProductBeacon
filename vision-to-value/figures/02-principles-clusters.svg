<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" width="920" height="720" role="img" aria-label="How the Eight Operating Principles Fit Together">
<defs>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#3B6BA5"/>
  </marker>
  <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#E07C3E"/>
  </marker>
  <style>
    text { font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0F1F33; }
    .h    { font-size: 16px; font-weight: 700; fill: #1F3A5F; }
    .sh   { font-size: 13px; font-weight: 600; fill: #1F3A5F; }
    .body { font-size: 11px; font-weight: 400; }
    .label{ font-size: 11px; font-weight: 500; fill: #FFFFFF; }
    .small{ font-size: 9px; font-weight: 400; fill: #3B6BA5; }
    .rail { font-size: 9px; font-weight: 600; fill: #3B6BA5; letter-spacing: 1px; }
  </style>
</defs>
<rect x="0" y="0" width="920" height="720" rx="8" ry="8" fill="#FFFFFF"/>
<text x="460.0" y="36" class="h" text-anchor="middle" style="font-size:20px">How the Eight Operating Principles Fit Together</text>
<text x="460.0" y="60" class="small" text-anchor="middle">Three reinforcing clusters — they operate as a system, not as isolated rules.</text>
<rect x="40.0" y="96" width="264.0" height="560" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="40.0" y="96" width="264.0" height="62" rx="8" ry="8" fill="#3B6BA5"/>
<text x="172.0" y="122" class="label" text-anchor="middle" style="font-weight:700;font-size:14px">Decision Ownership</text>
<text x="172.0" y="140" class="label" text-anchor="middle" style="font-weight:700;font-size:14px">and Alignment</text>
<text x="172.0" y="174" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">who owns decisions, and how</text>
<text x="172.0" y="188" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">alignment is held without</text>
<text x="172.0" y="202" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">forcing consensus</text>
<rect x="54.0" y="240" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="172.0" y="262" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 1</text>
<text x="172.0" y="280" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">End-to-end Ownership Is</text>
<text x="172.0" y="294" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Non-Negotiable</text>
<rect x="54.0" y="340" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="172.0" y="362" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 2</text>
<text x="172.0" y="380" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Alignment Beats Consensus</text>
<rect x="328.0" y="96" width="264.0" height="560" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="328.0" y="96" width="264.0" height="62" rx="8" ry="8" fill="#3B6BA5"/>
<text x="460.0" y="122" class="label" text-anchor="middle" style="font-weight:700;font-size:14px">The Strategic</text>
<text x="460.0" y="140" class="label" text-anchor="middle" style="font-weight:700;font-size:14px">Decision Surface</text>
<text x="460.0" y="174" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">how decision quality,</text>
<text x="460.0" y="188" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">structure, and go-to-market</text>
<text x="460.0" y="202" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">cohere under pressure</text>
<rect x="342.0" y="240" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="460.0" y="262" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 3</text>
<text x="460.0" y="280" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Product Leadership Is</text>
<text x="460.0" y="294" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">About Decision Quality</text>
<rect x="342.0" y="340" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="460.0" y="362" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 4</text>
<text x="460.0" y="380" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Strategy Precedes</text>
<text x="460.0" y="394" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Structure</text>
<rect x="342.0" y="440" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="460.0" y="462" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 5</text>
<text x="460.0" y="480" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Go-to-market Is a</text>
<text x="460.0" y="494" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Strategic Choice, Not a</text>
<text x="460.0" y="508" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Handoff</text>
<rect x="616.0" y="96" width="264.0" height="560" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="616.0" y="96" width="264.0" height="62" rx="8" ry="8" fill="#3B6BA5"/>
<text x="748.0" y="122" class="label" text-anchor="middle" style="font-weight:700;font-size:14px">Learning, Scale,</text>
<text x="748.0" y="140" class="label" text-anchor="middle" style="font-weight:700;font-size:14px">and Execution</text>
<text x="748.0" y="174" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">how the organization learns</text>
<text x="748.0" y="188" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">from outcomes, adapts as</text>
<text x="748.0" y="202" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">complexity grows, and executes</text>
<text x="748.0" y="216" class="small" text-anchor="middle" style="font-size:10px;fill:#1F3A5F">with discipline</text>
<rect x="630.0" y="254" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="748.0" y="276" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 6</text>
<text x="748.0" y="294" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Organizations Learn</text>
<text x="748.0" y="308" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Through Outcomes</text>
<rect x="630.0" y="354" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="748.0" y="376" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 7</text>
<text x="748.0" y="394" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Scale Changes the Nature</text>
<text x="748.0" y="408" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">of the Work</text>
<rect x="630.0" y="454" width="236.0" height="84" rx="6" ry="6" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="1"/>
<text x="748.0" y="476" class="sh" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Principle 8</text>
<text x="748.0" y="494" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Execution Is a Leadership</text>
<text x="748.0" y="508" class="body" text-anchor="middle" style="font-weight:600;font-size:11px;fill:#1F3A5F">Discipline</text>
<text x="460.0" y="696" class="small" text-anchor="middle" style="fill:#3B6BA5">Each cluster reinforces the others; principles are read together, not in isolation.</text>
</svg>
