<line x1="40" y1="248" x2="960" y2="248" stroke="#A8C5E0" stroke-width="2"/>
<text x="500.0" y="242" class="small" text-anchor="middle" style="font-size:8px;fill:#5B8AC0">boundary</text>
<text x="500.0" y="274" class="rail" text-anchor="middle" style="font-size:10px">AT THE BOUNDARY — PEER FUNCTIONS</text>
<rect x="40.0" y="290" width="221.0" height="92" rx="8" ry="8" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="2"/>
<text x="150.5" y="312" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">Engineering</text>
<text x="150.5" y="332" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">owns technical bets and</text>
<text x="150.5" y="345" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">platform decisions</text>
<rect x="273.0" y="290" width="221.0" height="92" rx="8" ry="8" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="2"/>
<text x="383.5" y="312" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">Design / UX</text>
<text x="383.5" y="332" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">owns experience coherence</text>
<text x="383.5" y="345" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">and interaction model</text>
<rect x="506.0" y="290" width="221.0" height="92" rx="8" ry="8" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="2"/>
<text x="616.5" y="312" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">Data &amp; Analytics</text>
<text x="616.5" y="332" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">owns sensors,</text>
<text x="616.5" y="345" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">instrumentation, outcome</text>
<text x="616.5" y="358" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">measurement</text>
<rect x="739.0" y="290" width="221.0" height="92" rx="8" ry="8" fill="#FFFFFF" stroke="#5B8AC0" stroke-width="2"/>
<text x="849.5" y="312" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">Customer Success</text>
<text x="849.5" y="332" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">owns account-level</text>
<text x="849.5" y="345" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">decisions and</text>
<text x="849.5" y="358" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">intervention triggers</text>
<text x="500.0" y="698" class="small" text-anchor="middle" style="fill:#3B6BA5">The Charter discipline names how decisions flow between the two tiers without collapsing the boundary.</text>
</svg>
