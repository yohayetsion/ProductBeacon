<rect x="0" y="0" width="1000" height="720" rx="8" ry="8" fill="#FFFFFF"/>
<text x="500.0" y="36" class="h" text-anchor="middle" style="font-size:20px">The Product Organization Seat Roster</text>
<text x="500.0" y="58" class="small" text-anchor="middle">Who sits inside the product organization — and who sits at the boundary as peer.</text>
<text x="500.0" y="102" class="rail" text-anchor="middle" style="font-size:10px">INSIDE THE PRODUCT ORGANIZATION</text>
