<rect x="437.71428571428567" y="118" width="124.57142857142857" height="100" rx="8" ry="8" fill="#3B6BA5"/>
<text x="499.99999999999994" y="159.0" class="label" text-anchor="middle" style="font-weight:700;font-size:12px">Competitive</text>
<text x="499.99999999999994" y="175.0" class="label" text-anchor="middle" style="font-weight:700;font-size:12px">Intelligence</text>
<rect x="570.2857142857142" y="118" width="124.57142857142857" height="100" rx="8" ry="8" fill="#3B6BA5"/>
<text x="632.5714285714286" y="159.0" class="label" text-anchor="middle" style="font-weight:700;font-size:12px">Business</text>
<text x="632.5714285714286" y="175.0" class="label" text-anchor="middle" style="font-weight:700;font-size:12px">Operations</text>
<rect x="702.8571428571428" y="118" width="124.57142857142857" height="100" rx="8" ry="8" fill="#3B6BA5"/>
