<rect x="0" y="0" width="1040" height="760" rx="8" ry="8" fill="#FFFFFF"/>
<text x="520.0" y="36" class="h" text-anchor="middle" style="font-size:20px">The CPO Peer Interface Map</text>
<text x="520.0" y="58" class="small" text-anchor="middle">Nine executive-altitude peer interfaces the CPO carries — each gates a recurring strategic decision.</text>
<line x1="520.0" y1="410.0" x2="520.0" y2="170.0" stroke="#A8C5E0" stroke-width="1.5"/>
