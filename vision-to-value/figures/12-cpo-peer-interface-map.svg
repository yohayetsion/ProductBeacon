<line x1="520.0" y1="410.0" x2="840.4293994002423" y2="530.0" stroke="#A8C5E0" stroke-width="1.5"/>
<line x1="520.0" y1="410.0" x2="646.5474530304974" y2="635.526228988618" stroke="#A8C5E0" stroke-width="1.5"/>
<line x1="520.0" y1="410.0" x2="393.4525469695026" y2="635.526228988618" stroke="#A8C5E0" stroke-width="1.5"/>
<line x1="520.0" y1="410.0" x2="199.57060059975777" y2="530.0000000000001" stroke="#A8C5E0" stroke-width="1.5"/>
