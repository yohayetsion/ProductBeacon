<line x1="520.0" y1="410.0" x2="282.1685844159804" y2="226.14933365144532" stroke="#A8C5E0" stroke-width="1.5"/>
<rect x="420.0" y="370.0" width="200" height="80" rx="8" ry="8" fill="#1F3A5F"/>
<text x="520.0" y="405.0" class="label" text-anchor="middle" style="font-weight:700;font-size:15px;fill:#FFFFFF">CPO</text>
<text x="520.0" y="423.0" class="label" text-anchor="middle" style="font-weight:400;font-size:11px;fill:#E8F0F8">the seat that holds them</text>
<rect x="422.0" y="128.0" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="520.0" y="150.0" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">CEO</text>
<text x="520.0" y="168.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Strategic intent,</text>
<text x="520.0" y="181.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">portfolio shape, capital</text>
<text x="520.0" y="194.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">envelope</text>
<rect x="659.8314155840196" y="184.1493336514453" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="757.8314155840196" y="206.1493336514453" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">CTO</text>
<text x="757.8314155840196" y="224.1493336514453" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Platform/product</text>
<text x="757.8314155840196" y="237.1493336514453" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">envelope, build-vs-buy,</text>
<text x="757.8314155840196" y="250.1493336514453" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">technical risk</text>
<rect x="786.3788686145169" y="326.3244373599367" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="884.3788686145169" y="348.3244373599367" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">CRO</text>
<text x="884.3788686145169" y="366.3244373599367" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Pipeline coverage,</text>
<text x="884.3788686145169" y="379.3244373599367" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">win-loss read,</text>
<text x="884.3788686145169" y="392.3244373599367" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">account-level commits</text>
<rect x="742.4293994002423" y="488.0" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="840.4293994002423" y="510.0" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">CFO</text>
<text x="840.4293994002423" y="528.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Bet economics, run-rate,</text>
<text x="840.4293994002423" y="541.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">capital re-allocation</text>
<rect x="548.5474530304974" y="593.526228988618" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="646.5474530304974" y="615.526228988618" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">CMO</text>
<text x="646.5474530304974" y="633.526228988618" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Category narrative,</text>
<text x="646.5474530304974" y="646.526228988618" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">market motion,</text>
<text x="646.5474530304974" y="659.526228988618" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">brand-product fit</text>
<rect x="295.4525469695026" y="593.526228988618" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="393.4525469695026" y="615.526228988618" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">COO</text>
<text x="393.4525469695026" y="633.526228988618" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Operational rhythm,</text>
<text x="393.4525469695026" y="646.526228988618" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">vendor strategy, capacity</text>
<rect x="101.57060059975777" y="488.0000000000001" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="199.57060059975777" y="510.0000000000001" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">CHRO</text>
<text x="199.57060059975777" y="528.0000000000001" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Talent design, leveling,</text>
<text x="199.57060059975777" y="541.0000000000001" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">leadership development</text>
<rect x="57.62113138548301" y="326.3244373599368" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="155.621131385483" y="348.3244373599368" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">GC / Privacy</text>
<text x="155.621131385483" y="366.3244373599368" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Regulatory risk,</text>
<text x="155.621131385483" y="379.3244373599368" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">contracts, IP, compliance</text>
<text x="155.621131385483" y="392.3244373599368" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">gates</text>
<rect x="184.16858441598038" y="184.14933365144532" width="196" height="84" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<text x="282.1685844159804" y="206.14933365144532" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px;fill:#1F3A5F">Board</text>
<text x="282.1685844159804" y="224.14933365144532" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Portfolio review, capital</text>
<text x="282.1685844159804" y="237.14933365144532" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">decisions, material risk</text>
<text x="520.0" y="730" class="small" text-anchor="middle" style="fill:#3B6BA5">Each interface produces an artifact (Decision Interface Charter) so the relationship survives the people in the seats.</text>
</svg>
