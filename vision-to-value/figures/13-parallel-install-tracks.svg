<text x="630.0" y="372.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Day 45</text>
<rect x="764.0" y="330.0" width="252.0" height="60" rx="4" ry="4" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="1.5"/>
<text x="890.0" y="352.0" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px">Rhythm + Triggers</text>
<text x="890.0" y="372.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Day 90</text>
<rect x="60" y="470" width="980" height="64" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<text x="550.0" y="496" class="sh" text-anchor="middle" style="font-weight:700;font-size:14px;fill:#E07C3E">Same shape. Different accountability distribution.</text>
<text x="550.0" y="520" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">The Decision Provenance Standard requires a named human signature in both patterns.</text>
