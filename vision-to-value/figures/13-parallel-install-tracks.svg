<text x="565.0" y="192.0" class="small" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Day 30</text>
<rect x="634.0" y="150.0" width="122.0" height="60" rx="4" ry="4" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="1.5"/>
<text x="695.0" y="172.0" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px">Interfaces</text>
