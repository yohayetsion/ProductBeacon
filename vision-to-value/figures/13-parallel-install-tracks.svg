<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" role="img" aria-label="Parallel Install Tracks: Series-C+ + Sub-Series-C">
<defs>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#3B6BA5"/>
  </marker>
  <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#E07C3E"/>
  </marker>
  <marker id="arrowhead-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#5B8AC0"/>
  </marker>
  <style>
    text { font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0F1F33; }
    .h    { font-size: 18px; font-weight: 700; fill: #1F3A5F; }
    .sh   { font-size: 13px; font-weight: 600; fill: #1F3A5F; }
    .body { font-size: 11px; font-weight: 400; }
    .label{ font-size: 11px; font-weight: 500; fill: #FFFFFF; }
    .small{ font-size: 9px; font-weight: 400; fill: #3B6BA5; }
    .rail { font-size: 9px; font-weight: 600; fill: #3B6BA5; letter-spacing: 1px; }
  </style>
</defs>
<rect x="0" y="0" width="1100" height="720" rx="8" ry="8" fill="#FFFFFF"/>
<text x="550.0" y="36" class="h" text-anchor="middle" style="font-size:20px">Parallel Install Tracks</text>
<text x="550.0" y="58" class="small" text-anchor="middle">Same six install moves, two staffing patterns. The shape is invariant; the human-hat-density is the variable.</text>
