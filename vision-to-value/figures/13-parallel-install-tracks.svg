<line x1="955.0" y1="230" x2="955.0" y2="310" stroke="#A8C5E0" stroke-width="1"/>
<rect x="60" y="310" width="980" height="100" rx="8" ry="8" fill="#5B8AC0"/>
<text x="76" y="336" class="label" text-anchor="start" style="font-weight:700;font-size:13px">SUB-SERIES-C</text>
<text x="76" y="356" class="label" text-anchor="start" style="font-size:11px;fill:#E8F0F8">~2 humans, 2–3 hats each</text>
<rect x="244.0" y="330.0" width="252.0" height="60" rx="4" ry="4" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="1.5"/>
<text x="370.0" y="352.0" class="sh" text-anchor="middle" style="font-weight:700;font-size:12px">Diagnose</text>
