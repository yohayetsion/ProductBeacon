<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 580" width="1040" height="580" role="img" aria-label="30-60-90: The Reader-Facing Arc Through the First Ninety Days">
<defs>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#3B6BA5"/>
  </marker>
  <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#E07C3E"/>
  </marker>
  <style>
    text { font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0F1F33; }
    .h    { font-size: 16px; font-weight: 700; fill: #1F3A5F; }
    .sh   { font-size: 13px; font-weight: 600; fill: #1F3A5F; }
    .body { font-size: 11px; font-weight: 400; }
    .label{ font-size: 11px; font-weight: 500; fill: #FFFFFF; }
    .small{ font-size: 9px; font-weight: 400; fill: #3B6BA5; }
    .rail { font-size: 9px; font-weight: 600; fill: #3B6BA5; letter-spacing: 1px; }
  </style>
</defs>
<rect x="0" y="0" width="1040" height="580" rx="8" ry="8" fill="#FFFFFF"/>
<text x="520.0" y="36" class="h" text-anchor="middle" style="font-size:20px">The 30-60-90 Day Arc</text>
<text x="520.0" y="58" class="small" text-anchor="middle">A reader-facing horizontal arc through the first ninety days — and what comes next.</text>
<rect x="32.0" y="120" width="185.6" height="380" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="32.0" y="120" width="185.6" height="52" rx="8" ry="8" fill="#3B6BA5"/>
<text x="124.8" y="152" class="label" text-anchor="middle" style="font-weight:700;font-size:15px">Week One</text>
<text x="124.8" y="198" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">Read the landscape</text>
<text x="124.8" y="214" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">before you replace it.</text>
<text x="124.8" y="246" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Map what is installed,</text>
<text x="124.8" y="260" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">memorized, missing, and</text>
<text x="124.8" y="274" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">drifting. Close with a</text>
<text x="124.8" y="288" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">one-page note.</text>
<rect x="229.6" y="120" width="185.6" height="380" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="229.6" y="120" width="185.6" height="52" rx="8" ry="8" fill="#3B6BA5"/>
<text x="322.4" y="152" class="label" text-anchor="middle" style="font-weight:700;font-size:15px">Days 1–30</text>
<text x="322.4" y="198" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">Install ONE Charter and</text>
<text x="322.4" y="214" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">name the PLT seats.</text>
<text x="322.4" y="246" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Pick a high-friction</text>
<text x="322.4" y="260" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">decision; install the</text>
<text x="322.4" y="274" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Charter and the seats it</text>
<text x="322.4" y="288" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">lives inside.</text>
<rect x="427.2" y="120" width="185.6" height="380" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="427.2" y="120" width="185.6" height="52" rx="8" ry="8" fill="#3B6BA5"/>
<text x="520.0" y="152" class="label" text-anchor="middle" style="font-weight:700;font-size:15px">Days 31–60</text>
<text x="520.0" y="198" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">Install the cadence and</text>
<text x="520.0" y="214" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">CPO‑counterparty</text>
<text x="520.0" y="230" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">interfaces.</text>
<text x="520.0" y="262" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Quarterly Portfolio</text>
<text x="520.0" y="276" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Review, monthly Outcome</text>
<text x="520.0" y="290" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Review, fortnightly</text>
<text x="520.0" y="304" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Charter cycle.</text>
<rect x="624.8" y="120" width="185.6" height="380" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="624.8" y="120" width="185.6" height="52" rx="8" ry="8" fill="#3B6BA5"/>
<text x="717.5999999999999" y="152" class="label" text-anchor="middle" style="font-weight:700;font-size:15px">Days 61–90</text>
<text x="717.5999999999999" y="198" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">Convert one Decision to</text>
<text x="717.5999999999999" y="214" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">a Commitment.</text>
<text x="717.5999999999999" y="246" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Harden one decision into a</text>
<text x="717.5999999999999" y="260" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Commitment; close the</text>
<text x="717.5999999999999" y="274" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">learning loop.</text>
<rect x="822.4" y="120" width="185.6" height="380" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="822.4" y="120" width="185.6" height="52" rx="8" ry="8" fill="#3B6BA5"/>
<text x="915.1999999999999" y="152" class="label" text-anchor="middle" style="font-weight:700;font-size:15px">Days 91‑180</text>
<text x="915.1999999999999" y="198" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">Observe a re-decision in</text>
<text x="915.1999999999999" y="214" class="body" text-anchor="middle" style="font-weight:600;font-size:12px;fill:#1F3A5F">flight.</text>
<text x="915.1999999999999" y="246" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">Install executive</text>
<text x="915.1999999999999" y="260" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">interfaces; the system</text>
<text x="915.1999999999999" y="274" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">runs without you in the</text>
<text x="915.1999999999999" y="288" class="small" text-anchor="middle" style="font-size:11px;fill:#3B6BA5">room.</text>
<line x1="32" y1="518" x2="1008" y2="518" stroke="#5B8AC0" stroke-width="2"/>
<polygon points="218.6,512 228.6,518 218.6,524" fill="#3B6BA5"/>
<polygon points="416.2,512 426.2,518 416.2,524" fill="#3B6BA5"/>
<polygon points="613.8,512 623.8,518 613.8,524" fill="#3B6BA5"/>
<polygon points="811.4,512 821.4,518 811.4,524" fill="#3B6BA5"/>
<circle cx="124.8" cy="518" r="5" fill="#3B6BA5" stroke="#FFFFFF" stroke-width="2"/>
<circle cx="322.4" cy="518" r="5" fill="#3B6BA5" stroke="#FFFFFF" stroke-width="2"/>
<circle cx="520.0" cy="518" r="5" fill="#3B6BA5" stroke="#FFFFFF" stroke-width="2"/>
<circle cx="717.5999999999999" cy="518" r="5" fill="#3B6BA5" stroke="#FFFFFF" stroke-width="2"/>
<circle cx="915.1999999999999" cy="518" r="5" fill="#3B6BA5" stroke="#FFFFFF" stroke-width="2"/>
<text x="520.0" y="544" class="small" text-anchor="middle" style="fill:#3B6BA5">The 30-60-90 arc is the reader's narrative spine; the six install Moves carry the same install at operational altitude.</text>
<text x="520.0" y="566" class="small" text-anchor="middle" style="font-weight:600;fill:#E07C3E">After Day 180 — the loop runs without you in the room.</text>
</svg>
