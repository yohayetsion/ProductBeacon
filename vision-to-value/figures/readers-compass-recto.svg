<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" role="img" aria-label="The Reader's Compass">
<defs>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#3B6BA5"/>
  </marker>
  <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#E07C3E"/>
  </marker>
  <marker id="arrowhead-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#5B8AC0"/>
  </marker>
  <style>
    text { font-family: Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #0F1F33; }
    .h    { font-size: 18px; font-weight: 700; fill: #1F3A5F; }
    .sh   { font-size: 13px; font-weight: 600; fill: #1F3A5F; }
    .body { font-size: 11px; font-weight: 400; }
    .label{ font-size: 11px; font-weight: 500; fill: #FFFFFF; }
    .small{ font-size: 9px; font-weight: 400; fill: #3B6BA5; }
    .rail { font-size: 9px; font-weight: 600; fill: #3B6BA5; letter-spacing: 1px; }
  </style>
</defs>
<rect x="0" y="0" width="960" height="720" rx="0" ry="0" fill="#FFFFFF"/>
<line x1="480" y1="370" x2="190" y2="186" stroke="#A8C5E0" stroke-width="1.5"/>
<line x1="480" y1="370" x2="770" y2="186" stroke="#A8C5E0" stroke-width="1.5"/>
<line x1="480" y1="370" x2="480" y2="526" stroke="#A8C5E0" stroke-width="1.5"/>
<rect x="60" y="608" width="840" height="84" rx="8" ry="8" fill="#E8F0F8" stroke="#A8C5E0" stroke-width="1"/>
<rect x="72" y="120" width="236" height="132" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<rect x="88.0" y="220" width="204" height="22" rx="10" ry="10" fill="#E8F0F8" stroke="#5B8AC0" stroke-width="1"/>
<rect x="652" y="120" width="236" height="132" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<rect x="668.0" y="220" width="204" height="22" rx="10" ry="10" fill="#E8F0F8" stroke="#5B8AC0" stroke-width="1"/>
<rect x="362" y="460" width="236" height="132" rx="8" ry="8" fill="#FFFFFF" stroke="#3B6BA5" stroke-width="2"/>
<rect x="378.0" y="560" width="204" height="22" rx="10" ry="10" fill="#E8F0F8" stroke="#5B8AC0" stroke-width="1"/>
<rect x="330" y="295" width="300" height="150" rx="8" ry="8" fill="#1F3A5F"/>
<text x="480" y="44" class="h" text-anchor="middle" style="font-weight:700;font-size:22px;fill:#1F3A5F">The Reader's Compass</text>
<text x="480" y="68" class="small" text-anchor="middle" style="font-size:12px;fill:#3B6BA5">Five elements, and where each one lives. Read this book at your altitude.</text>
<text x="480" y="338" class="label" text-anchor="middle" style="font-weight:700;font-size:16px;fill:#FFFFFF">The Decision Interface</text>
<text x="480" y="358" class="label" text-anchor="middle" style="font-weight:700;font-size:16px;fill:#FFFFFF">Charter</text>
<text x="480" y="382" class="label" text-anchor="middle" style="font-weight:400;font-size:10px;fill:#E8F0F8">the book's central durable artifact</text>
<text x="480" y="400" text-anchor="middle" style="font-family:Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:9.5px;font-weight:400;fill:#A8C5E0;font-style:italic">Named in the Introduction · earned across</text>
<text x="480" y="414" text-anchor="middle" style="font-family:Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:9.5px;font-weight:400;fill:#A8C5E0;font-style:italic">Chapters 1-4 · template in Appendix B,</text>
<text x="480" y="428" text-anchor="middle" style="font-family:Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:9.5px;font-weight:400;fill:#A8C5E0;font-style:italic">worked examples in Appendix C</text>
<text x="190" y="148" class="sh" text-anchor="middle" style="font-weight:700;font-size:13px;fill:#1F3A5F">The Six-Phase Flow</text>
<text x="190" y="184" class="body" text-anchor="middle" style="font-size:9px;fill:#5B8AC0">intent → decisions → commitments →</text>
<text x="190" y="197" class="body" text-anchor="middle" style="font-size:9px;fill:#5B8AC0">execution → outcomes → learning</text>
<text x="190" y="235" class="small" text-anchor="middle" style="font-weight:700;font-size:10px;fill:#1F3A5F">See Figure 1, Chapter 1</text>
<text x="770" y="148" class="sh" text-anchor="middle" style="font-weight:700;font-size:13px;fill:#1F3A5F">The Three Tiers</text>
<text x="770" y="184" class="body" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Decision altitude &amp; time-horizon:</text>
<text x="770" y="197" class="body" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">Tier 1 / Tier 2 / Tier 3</text>
<text x="770" y="235" class="small" text-anchor="middle" style="font-weight:600;font-size:9.5px;fill:#3B6BA5">Throughout · stratified in Chapter 1</text>
<text x="480" y="488" class="sh" text-anchor="middle" style="font-weight:700;font-size:13px;fill:#1F3A5F">Eight Operating</text>
<text x="480" y="505" class="sh" text-anchor="middle" style="font-weight:700;font-size:13px;fill:#1F3A5F">Principles</text>
<text x="480" y="530" class="body" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">The principles that preserve</text>
<text x="480" y="543" class="body" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">decision quality</text>
<text x="480" y="575" class="small" text-anchor="middle" style="font-weight:600;font-size:9.5px;fill:#3B6BA5">Chapter 8</text>
<text x="480" y="633" class="rail" text-anchor="middle" style="font-size:10px;fill:#3B6BA5">THE THREE ALTITUDES</text>
<text x="480" y="657" class="body" text-anchor="middle" style="font-weight:500;font-size:11px;fill:#1F3A5F">CPO / VP primary    ·    Product Leadership Team Directors one-down    ·    C-suite peers one-up</text>
<text x="480" y="678" text-anchor="middle" style="font-family:Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif;font-size:9.5px;font-weight:400;fill:#3B6BA5;font-style:italic">Read at your altitude (Introduction)</text>
</svg>
